name: FoodBatch Daily Job

on:
  workflow_dispatch: # 允許手動觸發測試與 GAS 觸發

jobs:
  run-daily-job:
    runs-on: ubuntu-latest
    # 如果您有設定環境，請取消下面這一行的註解並將名稱改為您的環境名稱（例如 production）
    # environment: production 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Hyper-Verbose Debug
        run: |
          echo "=== GitHub Context Info ==="
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Action: $GITHUB_ACTION"
          echo "=== Checking Environment Variables Names ==="
          # 這行只會印出「變數名稱」，不會印出內容，絕對安全
          node -e "console.log('可用環境變數清單:', Object.keys(process.env).filter(k => !k.startsWith('GITHUB') && !k.startsWith('RUNNER')))"
          echo "=== Hard Check for DISCORD_WEBHOOK_URL ==="
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then echo "DISCORD_WEBHOOK_URL exists in SECRETS"; else echo "DISCORD_WEBHOOK_URL NOT FOUND in SECRETS"; fi

      - name: Run Daily Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEET_TAB_NAME: "places"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          MY_MAPS_FILE_ID: ${{ secrets.MY_MAPS_FILE_ID }}
        run: node dist/index.js --run-once
