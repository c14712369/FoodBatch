name: FoodBatch Daily Job

on:
  schedule:
    # 每日台北時間 09:00 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  run-daily-job:
    runs-on: ubuntu-latest
    # 如果您有設定環境，請取消下面這一行的註解並將名稱改為您的環境名稱（例如 production）
    # environment: production 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Hyper-Verbose Debug
        run: |
          echo "=== GitHub Context Info ==="
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Action: $GITHUB_ACTION"
          echo "=== Checking Environment Variables Names ==="
          # 這行只會印出「變數名稱」，不會印出內容，絕對安全
          node -e "console.log('可用環境變數清單:', Object.keys(process.env).filter(k => !k.startsWith('GITHUB') && !k.startsWith('RUNNER')))"
          echo "=== Hard Check for DISCORD_TOKEN ==="
          if [ -n "${{ secrets.DISCORD_TOKEN }}" ]; then echo "DISCORD_TOKEN exists in SECRETS"; else echo "DISCORD_TOKEN NOT FOUND in SECRETS"; fi

      - name: Run Daily Scraper
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_SUMMARY_CHANNEL_ID: ${{ secrets.DISCORD_SUMMARY_CHANNEL_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEET_TAB_NAME: "places"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          MY_MAPS_FILE_ID: ${{ secrets.MY_MAPS_FILE_ID }}
        run: |
          node --input-type=module -e "
          import 'dotenv/config';
          import { Client, GatewayIntentBits } from 'discord.js';
          import { bootstrapSheet } from './dist/services/sheets.js';
          import { runDailyJob } from './dist/scheduler.js';
          const client = new Client({ intents: [GatewayIntentBits.Guilds] });
          bootstrapSheet()
            .then(() => client.login(process.env.DISCORD_TOKEN))
            .then(() => runDailyJob(client))
            .then(r => { console.log('Job Summary:', r); process.exit(0); })
            .catch(err => { console.error('Job Failed:', err); process.exit(1); });
          "
